# ─────────────────────────────────────────────────────────────
# STRATEGISCHE EINSTELLUNGEN
# ─────────────────────────────────────────────────────────────
settings:
  monatliches_budget_eur:    50.0
  max_position_anteil:       0.40      # max. 40 % in einem Titel
  max_ring1_anteil:          0.70      # max. 70 % in Ring 1 gesamt
  max_tactical_anteil:       0.20      # max. 20 % Tactical Bucket
  drawdown_scan_threshold:   0.15      # Pattern-Mining ab 15 % Drawdown
  alert_stufe2_trigger:      50        # Composite-Score für Caution-Alert
  alert_stufe3_trigger:      75        # Composite-Score für Red-Alert
  dca_fallback_etf:          "SMH"     # wenn kein Titel überzeugt

  # Risiko-Profil: "conservative" | "moderate" | "aggressive"
  risk_profile:              "conservative"

  # Notification
  telegram_enabled:          false     # true sobald Bot konfiguriert
  telegram_min_level:        2         # ab Stufe 2 benachrichtigen
  email_enabled:             false

  # ─────────────────────────────────────────────────────────────
  # API-KOSTEN-CAPS (3-Tier, calendar-day Aggregation)
  # Hard-Stop bei monthly. Ab 70% des Tages-Caps: Cost-Awareness-Block in Prompts.
  # ─────────────────────────────────────────────────────────────
  api_costs:
    hourly_eur:                0.20
    daily_eur:                 2.00
    monthly_eur:              50.00     # Mert's max-Budget für API-Analysen

  # ─────────────────────────────────────────────────────────────
  # AUTONOMOUS TRADING (Demo / Paper-Account auf dem Pi)
  # ─────────────────────────────────────────────────────────────
  trading:
    enabled:                   true
    broker:                    "alpaca_paper"   # alpaca_paper | mock | (später) alpaca_live
    live_trading:              false            # MUSS hier UND in env LIVE_TRADING=true sein für echte Orders
    mode:                      "adaptive"       # conservative | moderate | aggressive | adaptive

    # Position-Limits
    max_open_positions:        8                # gleichzeitig offene Positionen (Paper)
    max_position_eur:        300.0              # max EUR pro Position
    min_position_eur:         25.0              # unter diesem Wert wird gar nicht geordert
    starting_paper_capital:  10000.0            # MockBroker-Startkapital für Simulation

    # Buy-Trigger (Conservative-Default in Klammern)
    score_buy_max:            45                # Buy nur wenn composite < dieser Wert (conservative: 25)
    force_skip_alert_min:      2                # Bei alert_level >= 2 IMMER skippen
    moderate_alert_max:        1                # moderate-mode erlaubt alert_level<=1 (statt nur 0)

    # Sell-Trigger
    stop_loss_pct:             0.10             # auto-sell bei -10 % (conservative: 0.15)
    take_profit_pct:           0.20             # auto-sell bei +20 % (NEU)
    trailing_stop_pct:         0.08             # ab +12% Profit: -8% vom High = sell (NEU)
    trailing_activation_pct:   0.12             # ab welchem Profit Trailing-Stop aktiv wird

    max_daily_loss_pct:        0.05             # Tages-Drawdown der Equity-Curve, Notbremse
    max_trades_per_day:        5                # Hard-Cap (conservative: 3)

    # Marktöffnung (CET) — keine Orders außerhalb
    market_open_cet:          "15:30"
    market_close_cet:         "22:00"

    # Universe-Filter: nur diese Rings dürfen tactical traded werden
    tradeable_rings:           [1, 2]
    # ETF-Fallback wenn kein Titel überzeugt (bleibt fix)
    dca_fallback_ticker:      "SMH"

    # ── Regime-Profile fuer adaptive Mode (waehlen pro HMM-State) ──
    # Backtest-Befunde (Bull 2024-25 + Bear 2022 + Combined 3y):
    #   - aggressive in Bull: +39.89% (Sharpe 1.14)
    #   - conservative in Bear: -0.73% (vs SMH -34.97%, Alpha +34%)
    #   - kombiniert gewinnt adaptive
    regime_profiles:
      low_vol_bull:
        score_buy_max:        70       # noch mehr buy-Kandidaten (war 60)
        max_open_positions:   25
        max_position_eur:     5000     # mehr Capital pro Position (war 4000)
        max_trades_per_day:   10
        stop_loss_pct:        0.12
        take_profit_pct:      0.65     # spaeter raus (war 0.50)
        trailing_activation:  0.20
        trailing_stop_pct:    0.12
      high_vol_mixed:
        score_buy_max:        45       # aktuelles moderate-setup
        max_open_positions:   20
        max_position_eur:     2500
        max_trades_per_day:   5
        stop_loss_pct:        0.10
        take_profit_pct:      0.40
        trailing_activation:  0.10
        trailing_stop_pct:    0.10
      bear:
        score_buy_max:        20       # selektiv (gleich)
        max_open_positions:   8        # mehr Diversifikation (war 5)
        max_position_eur:     800      # bisschen mehr Capital (war 400)
        max_trades_per_day:   3
        stop_loss_pct:        0.08     # tight stop
        take_profit_pct:      0.20
        trailing_activation:  0.05
        trailing_stop_pct:    0.06
      unknown:                # fallback wenn HMM noch nicht trained ist
        score_buy_max:        45
        max_open_positions:   20
        max_position_eur:     2500
        max_trades_per_day:   5
        stop_loss_pct:        0.10
        take_profit_pct:      0.40
        trailing_activation:  0.10
        trailing_stop_pct:    0.10

    # Multi-Horizon Strategies (long-term hold + mid-term momentum)
    # Pro Strategy eigene take_profit/stop_loss/trailing-Schwellen.
    # Aktive Strategy-Auswahl beim Buy: ring 1 + composite<25 → long_term, sonst mid_term
    strategies:
      mid_term:
        take_profit_pct:        0.40    # Default-Strategy (T+7d-Outcomes)
        stop_loss_pct:          0.10
        trailing_activation_pct: 0.10
        trailing_stop_pct:      0.10
      long_term:
        take_profit_pct:        0.50    # Ring 1 Long-Term-Hold (T+30d-Outcomes)
        stop_loss_pct:          0.20    # weiter Stop-Loss = mehr Atemluft
        trailing_activation_pct: 0.25    # Trailing erst ab +25% aktiv
        trailing_stop_pct:      0.15    # bei -15% vom Hoch
    long_term_composite_max:    25      # für long_term: composite muss < 25 sein (zusaetzlich zu Ring 1)

    # Sector-Map fuer max_per_sector_pct-Constraint (neu)
    sector_map:
      semiconductors:    [NVDA, AMD, INTC, QCOM, MU, SMCI, TSM, ARM, AVGO, MRVL]
      equipment:         [ASML, AMAT, LRCX, KLAC, TER]
      software:          [CDNS, SNPS, CRM, NOW, SNOW, AI, SAP.DE, CAPG.PA, DSY.PA]
      hyperscaler:       [MSFT, GOOGL, META, AMZN, AAPL, ORCL]
      networking_storage: [ANET, DELL, PLTR]
      infrastructure:    [EQIX, VRT, ETN, NEE, SIE.DE]
      etfs:              [SMH, SOXX, AIQ, BOTZ, QQQ]


# ─────────────────────────────────────────────────────────────
# API KEYS (hier oder via Umgebungsvariablen)
# Leere Strings → System läuft im Stub-Modus für diese Quellen
# ─────────────────────────────────────────────────────────────
api_keys:
