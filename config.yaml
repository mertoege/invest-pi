  newsapi:             ""    # -> NEWSAPI_KEY in .env
  telegram_bot_token:  ""
  telegram_chat_id:    ""
  alpaca_key:          ""    # -> ALPACA_API_KEY in .env (Paper)
  alpaca_secret:       ""    # -> ALPACA_API_SECRET in .env
  alpaca_base_url:     "https://paper-api.alpaca.markets"
  anthropic:           ""    # -> ANTHROPIC_API_KEY in .env
