# shares und avg_buy_price werden nach jedem Kauf aktualisiert.
# ─────────────────────────────────────────────────────────────
portfolio:
  NVDA:
    invested_eur:    50.0
    shares:          null        # nach erstem Kauf eintragen
    avg_buy_price:   null        # Ø Kaufpreis in EUR/USD
    date_first:      "2025-01"
    currency:        "USD"
    ring:            1
    note:            "Core-Position · GPU-Monopol AI"

  ASML:
    invested_eur:    50.0
    shares:          null
    avg_buy_price:   null
