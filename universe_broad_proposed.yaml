# universe_broad_proposed.yaml — Vorschlag: regel-basiertes, branchen-breites Universum
# Zweck: ersetzt die handverlesene KI-/Chip-Liste durch einen branchen-gestreuten Large-Cap-Korb.
# REGEL statt These: grosse, liquide US-Large-Caps quer durch ALLE Sektoren — bewusst inkl.
# Nachzuegler (INTC, PFE, BA, T, VZ, NKE), damit KEIN Rueckschau-/Sieger-Bias entsteht.
# Momentum waehlt daraus monatlich die Top-5; der bestehende Sektor-Cap (<=35%) erzwingt Streuung.
# Stand 2026-06-24. ~60 Werte. Struktur kompatibel zu config.yaml -> universe (sektor-gruppiert).

