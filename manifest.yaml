tasks:
- title: Risiko-Toleranz festlegen
  art: einmalig
  prioritaet: mittel
  was: 'Entscheiden, welcher maximale Depot-Drawdown fuer dich noch ok ist (z.B. -20% vs -35%). Reine
    Wertentscheidung — steuert, wie defensiv Momentum eingestellt wird.'
- title: Monats-Check lesen
  art: routine
  turnus: monatlich
  prioritaet: niedrig
  was: 'Den automatischen Momentum-Monatsbericht (Telegram, 3. d. Monats) kurz anschauen — laeuft die
    Strategie gegen den Markt wie erwartet?'
- title: Echtgeld-Umstieg entscheiden
  art: einmalig
  prioritaet: hoch
  was: 'Wenn Momentum live ueber Zyklen inkl. mind. 1 Crash ueberzeugt hat — entscheiden, ob/mit wieviel
    echtem Geld gestartet wird. Erst dann, nicht frueher.'
notes: 'EUR-denominiert, Paper-Trading. Ziel: maximale absolute Rendite — aber mit Risiko­abwägung, nicht
  gepokert. GRUNDAUSRICHTUNG 2026-06-23: Backtests über Auf- (2025/26) und Abschwung (2022) zeigten, dass aktives Verkaufen in KEINEM Regime besser war als ruhiges Halten (Aufwärts +16% aktiv vs +20% halten; Bär -17% vs -15%). Schutz im Abschwung kommt aus Diversifikation, nicht aus häufigem Handeln. Daher momentum_exit (zuvor 63% aller Verkäufe) entschärft Richtung weniger Handeln / mehr Halten. Universe auf 29 handelbare Werte verbreitert (CAT/TGT/GS/SLB). 2026-06-23 SCHARFGESCHALTET: strategy_engine=momentum — Momentum-Top-5 (monatlich) ersetzt die alte Score-Pipeline (no-op), beide alten Handels-Pfade (run_strategy, weekly_rotation) delegieren/beenden. Belegt via champion_duell_fair / robustness_check / tax_check. Das alte Self-Learning des Score-Systems ist ruhend (Timer aus). Weiter Spielgeld; Echtgeld erst nach langem Live-Beweis.'
