# investpi — Projekt-Manifest · Single Source of Truth fuer den Canvas
# REGEL: Aenderungen an Aufbau/Status/Roadmap/Entscheidungen kommen HIER rein, nicht nur in den Chat.
# Live-Zahlen (KPIs/Positionen) zieht der Generator separat aus DB/Code.

summary: Autonomes Aktien-Trading (Paper über Alpaca). Kernstrategie seit 2026-06: regelbasiertes
  MOMENTUM — hält monatlich gleichgewichtet die 5 staerksten Aktien aus breitem Large-Cap-Universum.
  Fair backgetestet (2018-26, inkl. COVID- + 2022-Crash): schlaegt den Markt netto ~+16%/Jahr bei
  geringerem Drawdown. Das alte 20-Kennzahlen-Score-/Self-Learning-System wurde abgeloest (schlug den
  Markt nachweislich NICHT — Risiko-Vorhersage schlechter als ein Dummy). Lernen jetzt auf Strategie-
  Ebene (Varianten per Backtest validiert), nicht mehr Trade-fuer-Trade.
flow:
- - Quellen
  - yfinance · FRED · Google-Trends · Short-Interest
  - source
- - heuristic-v5
  - 20 Dimensionen → Risiko-Score 0–100 (live gewichtet)
  - engine
- - Decision Engine
  - Score + HMM-Regime → Kaufen/Halten/Verkaufen + Positionsgröße
  - decision
- - Risk-Limits
  - Stop-Loss · Cash-Floor · Sektor-Cap · Korrelation · Daily-Loss · Kill-Switch
  - guard
- - Alpaca (Paper)
  - Order-Ausführung, hält die Positionen
  - broker
- - Outcome-Messung
  - 'nach 7 Tagen: war der Score richtig?'
  - measure
- - Attribution
  - welche der 20 Dimensionen haben getroffen?
  - learn
- - Weight-Optimizer
  - Gewichte aus 60-Tage-Attribution anpassen ↺ zurück zu heuristic-v5
  - learn
loop:
  title: Self-Learning
  center: Risiko-Modell
  steps:
  - - Bewerten
    - jeder Aktie alle 30 Sek eine Risiko-Note geben (19 Kennzahlen, reine Mathematik)
  - - Handeln
    - nach den Noten + Sicherheitsregeln kaufen/verkaufen
  - - Messen
    - nach 7 Tagen prüfen, ob die Note stimmte
  - - Auswerten
    - welche der 19 Kennzahlen haben WIRKLICH gut vorhergesagt?
  - - Lernen
    - gute Kennzahlen zählen künftig mehr → Kreislauf beginnt von vorn
