# investpi — Projekt-Manifest · Single Source of Truth fuer den Canvas
# REGEL: Aenderungen an Aufbau/Status/Roadmap/Entscheidungen kommen HIER rein, nicht nur in den Chat.
# Live-Zahlen (KPIs/Positionen) zieht der Generator separat aus DB/Code.

summary: >-
  Autonomes Aktien-Trading (Paper über Alpaca). Kernstrategie seit 2026-06 = regelbasiertes
  MOMENTUM — hält monatlich gleichgewichtet die 5 staerksten Aktien aus breitem Large-Cap-Universum.
  Fair backgetestet (2018-26, inkl. COVID- + 2022-Crash): schlaegt den Markt netto ~+16%/Jahr bei
  geringerem Drawdown. Das alte 20-Kennzahlen-Score-/Self-Learning-System wurde abgeloest (schlug den
  Markt nachweislich NICHT — Risiko-Vorhersage schlechter als ein Dummy). Lernen jetzt auf Strategie-
  Ebene (Varianten per Backtest validiert), nicht mehr Trade-fuer-Trade.
flow:
- - Quellen
  - yfinance (Kurse/Volumen) · FRED (Makro) — breites Large-Cap-Universum
  - source
- - Momentum-Ranking
  - 6-Monats-Momentum je Aktie · Daten-Sanity + Mindestabdeckung + Cross-Check
  - engine
- - Top-5-Auswahl
  - 1×/Monat die 5 staerksten Titel, gleichgewichtet → Monatsziel
  - decision
- - Risk-Limits
  - Cash-Floor · Sektor-Cap · Korrelation · Daily-Loss · Kill-Switch · Circuit-Breaker
  - guard
- - Alpaca (Paper)
  - Konvergenz-Orders auf das Monatsziel, haelt die Positionen
  - broker
- - Monats-Check
  - automatischer Momentum-Report (monthly-digest) — Ziel eingehalten?
  - measure
- - Strategie-Lernen
  - Varianten per Backtest validieren (champion_duell / robustness) statt Trade-fuer-Trade
  - learn
loop:
  title: Momentum-Zyklus (monatlich)
  center: Momentum-Engine
  steps:
  - - Ranken
    - alle handelbaren Titel nach 6-Monats-Momentum sortieren (reine Mathematik)
  - - Auswaehlen
    - die Top 5 gleichgewichtet als Monatsziel fixieren
  - - Angleichen
    - Depot per Orders an das Ziel konvergieren (schwach raus, stark rein)
  - - Halten
    - den Monat ueber ruhig halten — kein Hin-und-Her-Handeln
  - - Pruefen
    - Strategie-Varianten per Backtest gegen den Markt testen → naechster Zyklus
# Stand 2026-06-24: 15 Timer aktiv (rotation stillgelegt). Self-Learning-Timer des alten Score-Systems
